<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>fNIRS Web Pipeline</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

  <link rel="stylesheet" href="style.css">
</head>

<body class="bg-slate-100 text-slate-800">

  <div id="rotateNotice" class="hidden fixed inset-0 z-50 p-6 items-center justify-center bg-slate-950 text-slate-100 text-center">
    <div>
      <div class="text-xl font-semibold mb-2">Rotate Device</div>
      <div class="text-sm text-slate-300">This app is optimized for landscape orientation.</div>
    </div>
  </div>

  <div id="appShell" class="max-w-7xl mx-auto p-4 lg:p-3 space-y-3 h-screen">

    <h1 class="text-2xl font-semibold">fNIRS Web Pipeline v0.2</h1>

    <div id="topRow" class="bg-white rounded border border-slate-200 p-2 grid grid-cols-1 lg:grid-cols-5 gap-2 items-start">
      <div class="min-w-[220px] rounded border border-slate-200 bg-slate-50 p-2">
        <div class="text-[11px] uppercase tracking-wide text-slate-600 font-semibold mb-1">App</div>
        <div class="text-xl font-semibold text-slate-100 leading-tight">fNIRS Web Pipeline v0.2</div>
      </div>

      <div class="min-w-[260px] rounded border border-slate-200 bg-slate-50 p-2">
        <div class="text-xs uppercase tracking-wide text-slate-600 font-semibold mb-2">Import</div>
        <input
          type="file"
          id="input"
          class="block w-full p-2 border rounded bg-white"
        >
      </div>

      <div id="protocolHost" class="hidden w-full lg:col-span-3"></div>
    </div>

    <div id="leftPanel" class="space-y-3">
      <div id="meta" class="bg-white rounded p-3 text-sm"></div>
      <div id="controls" class="hidden bg-white rounded p-3"></div>
    </div>

    <div id="plotGrid" class="bg-white rounded p-4 grid grid-cols-1 md:grid-cols-2 gap-4">
      <canvas id="plot" width="900" height="450" class="w-full"></canvas>
    </div>

  </div>

  <script src="mat4js.read.min.js"></script>
  <script src="filter.js"></script>
  <script src="plot.js"></script>
  <script src="app.js"></script>

</body>
</html>
